[tox]
envlist = yamllint, ansible-lint
skipsdist = True
skip_missing_interpreters = True

[testenv:yamllint]
deps = yamllint
changedir = {toxinidir}/../..
commands = yamllint .

[testenv:ansible-lint]
deps =
  ansible-core
  ansible-lint
changedir = {toxinidir}/../..
commands =
  ansible-galaxy collection install -r {toxinidir}/collections-requirements.yml --force
  ansible-lint
